body:
  text: 禮論王莽時劉歆孔昭以為易震巽等六子之卦為六宗漢武即位依虞書禋于六宗禮用大社至魏明帝時詔令王肅議六宗取家語宰我問六宗孔子曰所宗者六埋少牢於大昭祭時相近於坎壇祭寒暑王宮祭日夜明祭月幽禜祭星雩禜祭水旱孔安國注尚書與此同張融許從鄭君與義為允案月令孟冬云祈來年於天宗鄭云天宗日月星辰若然星辰入天宗又入六宗其日月入天宗即不入六宗之數也以其祭天主日配以月日月既尊如是故不得入宗也司馬彪等各為異說唐虞有三禮至周分為五禮王彪之以為禮冠自卜日不必三元也又禮夏冠用葛屨冬冠用皮屨明無定時也喪服小記生不及祖父母諸父昆弟而父稅喪己則否鄭注云當其時則服存服其喪服者或以明堂者文王廟周時德和合蒿茂大似宮柱名為蒿宮晉太常賀循云廟以容主為限無拘常數問改葬立凶門否蔡謨答云改葬若停喪若應有凶門問下殤葬墓有旐否徐邈答曰旐以題柩耳無不有旐問君將臨墓主人先以除身無服將若不哭主人常哭否賀循答之云凡君臨臣皆須先君哭禮也此際君宜哭則主不敢以哭煩君耳問墓中有何面為上荀納以為緣生奉終宜依禮坐蔡謨難問據周公明堂位東西以北為上與納反納之又引廟位以答王漢陽北墓向南以西為上蜀主劉禪景曜六年詔為丞相諸葛亮立廟於沔陽先是所在各請立廟不許百姓遂私祭之或以為可立於京師禪皆不納步兵校尉習崇中書侍郎向充等言於禪曰自漢以來小德而圖形立廟者多矣況亮德範遐邇勳蓋季興而烝嘗止於私門廟貌闕而莫立非所以存德念功遠追在昔也今若盡從人心則黷而無典建之京師又逼宗廟宜因近其墓立之於沔陽使所屬以時賜祭凡其臣故欲奉祠者皆限至廟斷其私祀於是從之何承天駮之曰周禮凡有功者祭於大烝故後代遵之元勳配饗充等曾不是式禪又從之蓋非禮也向歆問何承天曰父有伯母慘女服小功祖尊統一家年未可得嫁孫女不答曰吾謂祖為婚主女身又小功服不嫌於婚鄭尚書曰祖為婚主女父不與婚事意謂可婚周續之曰禮己雖小功可以冠娶妻則女身雖有服謂出門無嫌也伯母義服而祖為家主於理可通徐野人曰禮許變通記所謂父大功者當非有祖之家又公羊傳云不以父命辭王父母命推附名例義在尊無二上容或可通理耶江氏問裴松之曰從兄女先剋此六月與庾長史弟婚其姊蔡氏去三月亡葬送以畢從兄無嗣兄子簡為後今與從妹同服大功大功末可以嫁子不知無父而兄有大功服可復嫁妹不答曰意謂父有大功尚可嫁子兄在大功理無不可今所未了者未知女身大功亦可得嫁不文降而在大功得與本服九月者同不見宗濤答范超伯問娶婦之與嫁子輕重有一等之差己身小功可以娶妻女身大功何為不可以嫁謂此言為是但其論降在大功者如為不盡吾以為娉納禮重故採其本情適人差輕故以見服為斷禮無降在大功不可降子之文不應於外生疑且有下殤小功之喪過五月便可以娶降在九月者過三月而後嫁計其日月亦一等之謂也荀伯子難裴曰本不謂父可而兄反不可今所疑謂父兄及女身並不可耳按禮小功之初不妨嫁子其末則可以娶妻下殤之小功則不可今所本是周服故也今降在大功亦本是周服何容復於降殺之內以行婚姻之禮耶禮云大功之末可以嫁子者自是論本服耳所以不明降在大功不可者正以下殤之小功足以苞之也若謂與不降必其不殊者其兄弟出後姊妹出適便再降為小功矣請問居此小功服在始亦可即嫁子乎三月卒哭又可娶妻乎奚獨慈於下殤而薄於出降之甚耶何承天通裴難荀曰婚禮吉而非樂貴不失時元康中有犯喪者為憲司所糾都無降服大功嫁女之彈彼豈輕犯周制重犯功服耶固於禮自通不應致譏耳足下謂下殤小功不可娶足以苞降在大功不可嫁夫撤樂興嗣親之感繼燭發離別之悲唱行重於和從受禮重於納娉既有一等之差本服周者雖不得娶何疑得嫁耶若本降為大功不可嫁者大功降為小功亦不可娶豈獨下殤小功而已乎斯不然矣江氏問甲兒先亡甲後亡甲嫡孫傳重未及中祥嫡孫又亡有次孫今當應服三年不何承天答曰甲既有孫不得無服三年者謂次孫宜持重也但次孫先以制齋縗今得便易服當須中祥乃服練居堊室耳昔有問范宣云人有二兒無子小兒有子疑於傳重宣答小兒之子應服三年亦粗可依裴松之答承天書曰禮傳嫡不傳重傳重非嫡皆不加服明嫡不可二也范宣所云次孫本無三年之道若應為服後次孫宜為喪主終竟三年而不得服三年之服也承天與司馬操書論其事操云有孫見存而疏親為後則不通既不得立疏豈可遂無持重者此孫豈不得服三年耶嫡不傳重傳重非嫡自施於親服卑無關於孫為祖也何承天問曰婦人夫先亡無男有女己出嫁婦人亡後未周宗從之家乃以兒繼其後今既更制廬杖末知當及亡月一周便練為取出後日為制服之始荀伯子答曰出後晚異於聞喪晚稅服也應以亡月為周不以出後日為制服之始假使甲有婦及男女甲死甲兒持重服已練甲兒復死甲弟乙方以子景後甲以為伯持周年服訖便更制二十五月服甲婦女不合先景除服何容持三周服耶難者或疑若使甲服將除而景始出後景便是服斬旬日而除意謂若服將訖宜待服除方出後耳不可使甲婦女制四周服也承天重問出適之女周而除心制既過即吉之後而來繼之弟不為喪始門庭凶素靈筵末毀舛錯深淺豈稱人情今謂宜待除服為後是也今問不待除者耳若不服其殘月便當如知喪晚持一人未即吉二條何者為安荀重答曰意謂出後未及練者宜服其殘月以亡月為周若將服竟出後宜延待服竟至於去廬即練綬縞從輕此自降殺以漸所謂送死有以復生有節明出後始為喪主也又謂為人後者在練則練在綅則綅何疑服旬便除然謂此語不通設使甲死其婦女持服已再周甲弟乙持二子從遠還始聞喪以長子景後甲景弟丁為伯父追周服景以去後之故更綅縞旬日除所謂深淺舛錯不是過也譬如知喪晚特一人未即吉此又所疑也凡出後晚異知喪晚也既已制本服今日月已過無緣更居再周若申之婦女無事不吉而來繼之子門庭凶素此婦女無容避此凶居別卜吉宅又不可使婦女歌於內而繼子哭於外謂應服其殘月司馬操難為人後者盡禮於彼致降於此所以全受重之過成若子之義豈以真假殊其事早晚異其制哉豈不父子之名定於受命之辰加崇之恩起於辭親之日大義昭然無厭奪之變而使情節伸而有餘歲月居於不足未知輕重將欲何附論云甲死甲兒持服己練甲兒死甲弟乙方以子景後之景無緣為伯持周服畢復更制二十五月服難曰景以甲練後方來後甲彼喪雖殺我重自始更制遠月於義何傷且昔以旁尊服不踰齋今為其子禮窮於制事乖義異深淺殊絕豈宜相蒙共為三年若是大功小功之親本服已訖乃為之後亦可計本服之月以充再周之限若無服之親今為甲嗣其義云何論云甲婦女無緣持三周服又不合先景除服難曰甲婦女二周終訖何事三周吉凶有期何必顧景亦猶自遠之兄始及袒絻居室之弟久已笙歌豈得同一論云或疑甲服垂除而景出後景應服斬旬日而除意謂延待服除而出後耳難曰景以禮而行不及甲始喪蓋由事趣且夫堂階絕搆喪位無主行路悽愴骨肉悼心既為置後宜及三年之內情事有寄豈得持疑以俟吉視再周之徒過哉論曰甲死婦女持服再周弟乙二子遠還以長子景後甲景弟丁為伯父追稅服周而景以出後之故更居綅縞旬日而除舛錯深淺不復是過難曰乙之子景今來後甲既不可與弟丁同稅周服又不可蹔居綅縞旬日而除則景於甲之喪終闕徵服親為甲子而反不如丁有周月之制處之於三年之地而絕之於一日之哀待吉之義於此為躓論曰甲婦無緣避此凶居別卜吉宅又不可使婦女歌於內繼子哭於外難曰甲婦雖復縗麻去身號咷輟響然素服嫠居與代長戚夫何圖于吉宅何務於謳歌荀伯子答司馬操難曰為人子者奉亡事存如所生不異盡禮於彼而致降於此答曰同所生者謂出後及所養耳不謂垂除而追責使同也設使所繼者是絕服之親而繼父有兄弟喪未周豈可悉追制伯叔周服乎故知及喪則同已死則異若本服大功之親雖數十載之後猶追為稅服至於出後之子在三年之外便不為繼父追服明既往不可得同也難曰乙子景今來後甲既不與其弟丁同稅周服又不可制居綅縞旬日而除既為甲子而反不如丁豈有處三年之地而絕於一日之哀乎答云謂景應先稅周服畢然後可出後耳設使甲死已三十年乙將景丁從絕域還後之事乎若使景居重甲婦女平吉以來或是朝市改易豈可方納一孝居喪乎雖復三十年而丁猶稅服景不可以反不如丁得不待稅服畢乎設使周公更生不能違此言也更生不能違此言也
